    #       - Datasets: using/datasets.md
    # - Examples:
    #       - World Ocean Database: examples/wod.md
    - API Documentation:
        - Home: index.md
        - Data Retrieval functions: 
            - DataClient: reference/data/data_client.md
            - API Specific Clients: 
                - CDSClient: reference/data/cds_client.md
                - MarsClient: reference/data/mars_client.md
                - BeaconClient: reference/data/beacon_client.md
                - CordexClient: reference/data/cordex_client.md
            - Conversions: reference/data/conversions.md
